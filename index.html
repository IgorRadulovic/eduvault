<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>EduVault — Unlock Your Potential</title>
    <meta name="description" content="Premium courses and ebooks curated by industry experts. Learn at your pace, apply skills immediately. Join 50,000+ learners." />
    <meta name="keywords"    content="online courses, ebooks, learning, education, programming, design, business" />
    <meta name="author"      content="EduVault" />
    <meta name="robots"      content="index, follow" />
    <link rel="canonical"    href="https://eduvault.com" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://eduvault.com" />
    <meta property="og:title"       content="EduVault — Unlock Your Potential" />
    <meta property="og:description" content="Premium courses and ebooks curated by industry experts. Join 50,000+ learners." />
    <meta property="og:image"       content="/logo.png" />
    <meta property="og:site_name"   content="EduVault" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="EduVault — Unlock Your Potential" />
    <meta name="twitter:description" content="Premium courses and ebooks curated by industry experts." />
    <meta name="twitter:image"       content="/logo.png" />

    <!-- Favicon -->
    <link rel="icon"             type="image/png"  href="/logo.png" />
    <link rel="apple-touch-icon"                   href="/logo.png" />

    <!-- PWA -->
    <meta name="theme-color"        content="#1565C0" />
    <meta name="mobile-web-app-capable"      content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options"  content="nosniff" />
    <meta http-equiv="X-Frame-Options"         content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy"         content="strict-origin-when-cross-origin" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
